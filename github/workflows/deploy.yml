name: Deploy to K3s

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and Push Image (versioned)
      run: |
        IMAGE=${{ secrets.DOCKER_USERNAME }}/system-monitor:${{ github.sha }}
        docker build -t $IMAGE .
        docker push $IMAGE

    - name: Deploy to K3s via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_KEY }}
        script: |
          IMAGE=${{ secrets.DOCKER_USERNAME }}/system-monitor:${{ github.sha }}

          kubectl set image deployment/system-monitor \
          system-monitor=$IMAGE

          kubectl rollout status deployment/system-monitor --timeout=120s
